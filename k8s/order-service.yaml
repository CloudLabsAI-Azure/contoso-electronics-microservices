apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: contoso
  labels:
    app: order-service
    app.kubernetes.io/part-of: contoso-electronics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: acrcontosomicroprod.azurecr.io/order-service:v1
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            - name: NODE_ENV
              value: "production"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: cosmos-secrets
                  key: order-mongo-uri
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service.contoso.svc.cluster.local:3001"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: contoso
  labels:
    app: order-service
spec:
  selector:
    app: order-service
  ports:
    - port: 3002
      targetPort: 3002
      protocol: TCP
  type: ClusterIP

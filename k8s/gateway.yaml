apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: contoso
  labels:
    app: gateway
    app.kubernetes.io/part-of: contoso-electronics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: acrcontosomicroprod.azurecr.io/gateway:v2
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service.contoso.svc.cluster.local:3001"
            - name: ORDER_SERVICE_URL
              value: "http://order-service.contoso.svc.cluster.local:3002"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: contoso
  labels:
    app: gateway
spec:
  selector:
    app: gateway
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
  type: ClusterIP

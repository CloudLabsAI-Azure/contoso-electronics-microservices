version: '3.8'

services:
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  product-service:
    build:
      context: ./product-service
    ports:
      - '3001:3001'
    environment:
      - PORT=3001
      - MONGO_URI=mongodb://mongo:27017/contoso_products
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  order-service:
    build:
      context: ./order-service
    ports:
      - '3002:3002'
    environment:
      - PORT=3002
      - MONGO_URI=mongodb://mongo:27017/contoso_orders
      - PRODUCT_SERVICE_URL=http://product-service:3001
    depends_on:
      mongo:
        condition: service_healthy
      product-service:
        condition: service_started
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - PRODUCT_SERVICE_URL=http://product-service:3001
      - ORDER_SERVICE_URL=http://order-service:3002
    depends_on:
      - product-service
      - order-service
    restart: unless-stopped

volumes:
  mongo-data:
